<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة روليت القبائل الاحترافية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- الخلفية المتحركة (الجزيئات المتطايرة) -->
    <div class="particles" id="particles"></div>

    <main class="game-container">
        <!-- قسم العجلة -->
        <section class="wheel-section">
            <div class="wheel-wrapper">
                <div class="arrow"></div>
                <canvas id="wheel" width="450" height="450"></canvas>
                <button id="spin-btn" class="hidden" aria-label="تدوير العجلة">تدوير</button>
            </div>
        </section>

        <!-- قسم التحكم والأسماء -->
        <section class="controls-section">
            <h1 class="game-title">روليت القبائل</h1>

            <textarea id="names-input" placeholder="أدخل أسماء المشاركين هنا... (اسم واحد في كل سطر)"></textarea>

            <div class="buttons-group">
                <button id="add-btn" class="btn btn-primary">إضافة اللاعبين للعجلة</button>
                <button id="start-btn" class="btn btn-success hidden">بدء الجولة</button>
                <button id="shuffle-btn" class="btn btn-secondary hidden">إعادة ترتيب عشوائي</button>
                <button id="reset-btn" class="btn btn-danger hidden">إعادة تعيين الجميع</button>
            </div>

            <p id="player-count" class="player-count"></p>
        </section>
    </main>

    <!-- نافذة القبائل (إقصاء / إرجاع) -->
    <div id="modal" class="modal" role="dialog" aria-modal="true">
        <div class="modal-content">
            <h2 id="modal-title">اختر قبيلة</h2>
            <p id="modal-subtitle" class="modal-subtitle"></p>
            <div id="tribes-container" class="tribes-grid"></div>
        </div>
    </div>

    <!-- نافذة تأثيرات الفرح / الحزن -->
    <div id="effect-overlay" class="effect-overlay">
        <div id="effect-content" class="effect-content"></div>
    </div>

    <!-- نافذة إعلان الفائز النهائي -->
    <div id="winner-overlay" class="effect-overlay">
        <div class="winner-box">
            <div class="trophy">🏆</div>
            <h2 id="winner-name"></h2>
            <p id="winner-eliminator"></p>
            <button id="play-again-btn" class="btn btn-primary">لعبة جديدة</button>
        </div>
    </div>

    <!-- صندوق الرسائل السريعة (بديل التنبيهات الافتراضية) -->
    <div id="toast" class="toast"></div>

    <footer>
        <p class="signature">تم تصميم اللعبة وتطويرها من قبل أيمن | AYMN</p>
        <p class="tiktok">تابعني على تيك توك: <span class="username">em70_q</span></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
