<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة روليت القبائل الاحترافية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- شاشة الافتتاح الاحترافية (تظهر عند فتح الرابط ثم تتلاشى) -->
    <div class="intro-overlay" id="intro-overlay">
        <h1 class="intro-title" id="intro-title">روليت القبائل</h1>
    </div>

    <!-- شريط إعلان الفائز الضخم (يظهر أعلى الشاشة فوق لوحة اللاعبين) -->
    <div class="winner-banner" id="winner-banner">
        <span class="winner-banner-label">🏆 الفائز</span>
        <span class="winner-banner-name" id="winner-banner-name"></span>
    </div>

    <!-- الخلفية المتحركة (الجزيئات المتطايرة) -->
    <div class="particles" id="particles"></div>

    <!-- طبقة الإيموجي العائم (فرح / حزن) -->
    <div class="emoji-float-layer" id="emoji-float-layer"></div>

    <!-- طبقة فقاعات الاحتفال بالفائز -->
    <div class="bubbles-layer" id="bubbles-layer"></div>

    <!-- الشعار العائم -->
    <img src="logo.png" alt="شعار اللعبة" class="floating-logo" id="floating-logo">

    <!-- متحكم مستوى الصوت -->
    <div class="volume-control" id="volume-control">
        <span class="volume-icon" id="volume-icon">🔊</span>
        <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="70" aria-label="مستوى الصوت">
    </div>

    <!-- الترويسة العلوية: عنوان اللعبة + اسم الستريمر -->
    <header class="top-header" id="top-header">
        <h1 class="game-title" id="game-title">روليت القبائل</h1>
        <div class="streamer-name-wrapper" id="streamer-name-wrapper">
            <input
                type="text"
                id="streamer-name-input"
                class="streamer-name-input"
                placeholder="اسم الستريمر (اختياري)"
                maxlength="24"
                aria-label="اسم الستريمر">
            <button type="button" id="streamer-name-close" class="streamer-name-close" aria-label="إغلاق">&times;</button>
        </div>
    </header>

    <!-- طبقة العجلة القابلة للسحب - تظهر في منتصف الشاشة أسفل العنوان مباشرة،
         ويمكن للستريمر سحبها لأي مكان يناسب تخطيط بثه المباشر -->
    <div class="wheel-drag-layer" id="wheel-drag-layer">
        <div class="wheel-wrapper">
            <div class="arrow"></div>
            <canvas id="wheel" width="450" height="450"></canvas>
            <button id="spin-btn" class="hidden" aria-label="تدوير العجلة">تدوير</button>
        </div>

        <!-- متحكم تكبير/تصغير العجلة (يعمل حتى بعد بدء الجولة، ويتحرك مع العجلة) -->
        <div class="wheel-scale-control" id="wheel-scale-control">
            <span class="scale-icon">🔍</span>
            <input type="range" id="wheel-scale-slider" class="wheel-scale-slider" min="60" max="150" value="100" aria-label="حجم العجلة">
            <span class="scale-icon">🔎</span>
        </div>
    </div>

    <!-- الشريط الجانبي الأيسر: أزرار إعادة الترتيب وإعادة التعيين -->
    <aside id="left-controls" class="left-controls hidden">
        <h3>أدوات التحكم</h3>
        <button id="shuffle-btn" class="btn btn-secondary hidden">إعادة ترتيب عشوائي</button>
        <button id="reset-btn" class="btn btn-danger hidden">إعادة تعيين الجميع</button>
    </aside>

    <main class="game-container">
        <!-- قسم التحكم والأسماء -->
        <section class="controls-section">
            <textarea id="names-input" placeholder="أدخل أسماء المشاركين هنا... (اسم واحد في كل سطر)"></textarea>

            <div class="buttons-group">
                <button id="add-btn" class="btn btn-primary">إضافة اللاعبين للعجلة</button>
                <button id="start-btn" class="btn btn-success hidden">بدء الجولة</button>
            </div>

            <p id="player-count" class="player-count"></p>
        </section>
    </main>

    <!-- الشريط الجانبي الدائم (يظهر بعد بدء الجولة ويحتضن حقل الأسماء وزر الإضافة) -->
    <aside id="game-sidebar" class="game-sidebar hidden">
        <h3>إدارة اللاعبين</h3>
    </aside>

    <!-- نافذة القبائل (إقصاء / إرجاع) -->
    <div id="modal" class="modal" role="dialog" aria-modal="true">
        <div class="modal-content">
            <h1 id="modal-chooser-name" class="modal-chooser-name"></h1>
            <h2 id="modal-title">اختر قبيلة</h2>
            <p id="modal-subtitle" class="modal-subtitle"></p>
            <div id="tribes-container" class="tribes-grid"></div>
            <div id="modal-actions" class="modal-actions"></div>
        </div>
    </div>

    <!-- نافذة تأثيرات الفرح / الحزن -->
    <div id="effect-overlay" class="effect-overlay">
        <div id="effect-content" class="effect-content"></div>
    </div>

    <!-- نافذة إعلان الفائز النهائي -->
    <div id="winner-overlay" class="effect-overlay">
        <div class="winner-card-pro">
            <div class="trophy">🏆</div>
            <p class="winner-label">الفائز النهائي</p>
            <h2 id="winner-name"></h2>
            <div class="winner-divider"></div>
            <div class="eliminator-box">
                <p id="winner-eliminator"></p>
            </div>
            <button id="play-again-btn" class="btn btn-primary">لعبة جديدة</button>
        </div>
    </div>

    <!-- صندوق الرسائل السريعة (بديل التنبيهات الافتراضية) -->
    <div id="toast" class="toast"></div>

    <footer>
        <p class="signature">تم تصميم اللعبة وتطويرها من قبل أيمن | AYMN</p>
        <p class="tiktok">تابعني على تيك توك: <span class="username">em70_q</span></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
